name: Content backup

# Durable, versioned backup of the CMS content so a database loss is recoverable from git.
# Requires two repo secrets: DATABASE_URL and PAYLOAD_SECRET (Settings → Secrets → Actions).
# Dumps every collection + global to content-backup/*.json and commits changes.

on:
  schedule:
    - cron: '17 9 * * 1' # Mondays 09:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: content-backup
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Export content
        run: pnpm export:content
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      - name: Commit backup if changed
        run: |
          git config user.name "content-backup-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content-backup
          if git diff --cached --quiet; then
            echo "No content changes to back up."
          else
            git commit -m "chore: content backup $(date -u +%Y-%m-%d)"
            git push
          fi
